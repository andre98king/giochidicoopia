# Configurazione Aider — Co-op Games Hub
# Documentazione: https://aider.chat/docs/config/aider_conf.html

# Modello principale: Ollama locale
model: ollama/qwen2.5-coder:14b
openai-api-base: http://localhost:11434/v1
openai-api-key: ollama

# Modello debole per task semplici (edit, commit msg, ecc.)
weak-model: ollama/qwen2.5-coder:7b

# File di contesto sempre caricati in sola lettura
read:
  - CLAUDE.md
  - AI_COLLABORATION.md

# Non fare commit automatici — aspetta conferma utente
auto-commits: false

# Niente push automatici
auto-lint: false

# Output leggibile
pretty: true

# Sopprime avvisi su modelli non riconosciuti
show-model-warnings: false

# Impostazioni contesto esteso per Ollama
model-settings-file: .aider.model.settings.yml
