name: Update Games Database

on:
  schedule:
    - cron: '0 6 * * 1'   # Ogni lunedì alle 6:00 UTC
  workflow_dispatch:        # Avvio manuale dalla pagina Actions di GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Necessario per fare push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update script
        run: python3 auto_update.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add games.js
          if git diff --staged --quiet; then
            echo "Nessuna modifica da committare."
          else
            git commit -m "🤖 Auto-update database giochi [skip ci]"
            git push
          fi
