name: Update Games Database

on:
  schedule:
    - cron: '0 6 * * *'   # Ogni giorno alle 6:00 UTC
  workflow_dispatch:        # Avvio manuale dalla pagina Actions di GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Necessario per fare push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run update script
        run: python3 scripts/auto_update.py
        env:
          ITCH_IO_KEY: ${{ secrets.ITCH_IO_KEY }}
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}

      # 🔒 AUTO CURATION & QUALITY GATE — filtra giochi a bassa qualità PRIMA del deploy
      - name: 🔒 Auto Curation & Quality Gate
        run: python3 scripts/run_curation_gate.py

      - name: Fetch affiliate prices (parallel)
        continue-on-error: true
        run: |
          python3 scripts/fetch_affiliate_prices.py &
          python3 scripts/fetch_gameseal_prices.py &
          python3 scripts/fetch_gamivo_prices.py &
          python3 scripts/fetch_k4g_prices.py &
          python3 scripts/fetch_gmg_prices.py &
          wait

      - name: Build static game pages
        run: python3 scripts/build_static_pages.py

      - name: Build hub pages SEO
        run: python3 scripts/build_hub_pages.py

      - name: Validate catalog and generated pages
        run: python3 scripts/validate_catalog.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/games.js games sitemap*.xml data/catalog.games.v1.json data/catalog.public.v1.json index.html assets/i18n.js
          if git diff --staged --quiet; then
            echo "Nessuna modifica da committare."
          else
            git commit -m "🤖 Auto-update database giochi"
            git pull --rebase origin main
            git push
          fi
