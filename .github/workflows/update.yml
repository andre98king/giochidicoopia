name: Update Games Database

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  auto-update-db:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.commit_check.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run update script
        run: python3 scripts/auto_update.py
        env:
          ITCH_IO_KEY: ${{ secrets.ITCH_IO_KEY }}
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}

      - name: Auto Curation & Quality Gate
        run: python3 scripts/run_curation_gate.py

      - name: Check for changes
        id: commit_check
        run: |
          if git diff --stat | grep -q .; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: db-output
          path: |
            assets/games.js
            data/catalog.games.v1.json
            data/catalog.public.v1.json
          retention-days: 1

  fetch-affiliate:
    runs-on: ubuntu-latest
    needs: auto-update-db
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: db-output

      - name: Run fetch affiliate prices
        run: python3 scripts/fetch_affiliate_prices.py

  fetch-gameseal:
    runs-on: ubuntu-latest
    needs: auto-update-db
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: db-output

      - name: Run fetch gameseal prices
        run: python3 scripts/fetch_gameseal_prices.py
        env:
          CJ_API_TOKEN: ${{ secrets.CJ_API_TOKEN }}

  fetch-gamivo:
    runs-on: ubuntu-latest
    needs: auto-update-db
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: db-output

      - name: Run fetch gamivo prices
        run: python3 scripts/fetch_gamivo_prices.py
        env:
          CJ_API_TOKEN: ${{ secrets.CJ_API_TOKEN }}

  fetch-k4g:
    runs-on: ubuntu-latest
    needs: auto-update-db
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: db-output

      - name: Run fetch k4g prices
        run: python3 scripts/fetch_k4g_prices.py

  fetch-gmg:
    runs-on: ubuntu-latest
    needs: auto-update-db
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: db-output

      - name: Run fetch gmg prices
        run: python3 scripts/fetch_gmg_prices.py

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: [auto-update-db, fetch-affiliate, fetch-gameseal, fetch-gamivo, fetch-k4g, fetch-gmg]
    if: needs.auto-update-db.outputs.has_changes != 'false'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Download db artifact
        uses: actions/download-artifact@v4
        with:
          name: db-output

      - name: Build static game pages
        run: python3 scripts/build_static_pages.py

      - name: Build hub pages SEO
        run: python3 scripts/build_hub_pages.py

      - name: Validate catalog and generated pages
        run: python3 scripts/validate_catalog.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/games.js games en sitemap*.xml data/catalog.games.v1.json data/catalog.public.v1.json index.html assets/i18n.js about.html contact.html free.html game.html giochi-coop-*.html migliori-giochi-coop-*.html privacy.html
          if git diff --staged --quiet; then
            echo "Nessuna modifica da committare."
          else
            git commit -m "🤖 Auto-update database giochi"
            git pull --rebase origin main
            git push
          fi
