name: Update Games Database

on:
  schedule:
    - cron: '0 6 * * *'   # Ogni giorno alle 6:00 UTC
  workflow_dispatch:        # Avvio manuale dalla pagina Actions di GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Necessario per fare push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run update script
        run: python3 scripts/auto_update.py
        env:
          ITCH_IO_KEY: ${{ secrets.ITCH_IO_KEY }}
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}

      - name: Fetch affiliate prices (IG + GameBillet)
        id: fetch_affiliate
        continue-on-error: true
        run: python3 scripts/fetch_affiliate_prices.py

      - name: Fetch Gameseal + Kinguin prices (CJ API)
        id: fetch_gameseal
        continue-on-error: true
        run: python3 scripts/fetch_gameseal_prices.py
        env:
          CJ_API_TOKEN: ${{ secrets.CJ_API_TOKEN }}

      - name: Fetch GAMIVO prices (CJ API)
        id: fetch_gamivo
        continue-on-error: true
        run: python3 scripts/fetch_gamivo_prices.py
        env:
          CJ_API_TOKEN: ${{ secrets.CJ_API_TOKEN }}

      - name: Fetch K4G prices
        id: fetch_k4g
        continue-on-error: true
        run: python3 scripts/fetch_k4g_prices.py

      - name: Fetch GMG prices (Impact.com)
        id: fetch_gmg
        continue-on-error: true
        run: python3 scripts/fetch_gmg_prices.py

      - name: Price fetcher summary
        if: always()
        run: |
          FAILED=0
          TOTAL=5
          for STEP_OUTCOME in \
            "${{ steps.fetch_affiliate.outcome }}" \
            "${{ steps.fetch_gameseal.outcome }}" \
            "${{ steps.fetch_gamivo.outcome }}" \
            "${{ steps.fetch_k4g.outcome }}" \
            "${{ steps.fetch_gmg.outcome }}"; do
            if [ "$STEP_OUTCOME" != "success" ]; then
              FAILED=$((FAILED + 1))
            fi
          done
          echo "Price fetchers: $((TOTAL - FAILED))/$TOTAL succeeded"
          if [ "$FAILED" -ge 3 ]; then
            echo "::warning::$FAILED out of $TOTAL price fetchers failed — prices may be stale"
          fi

      - name: Build static game pages
        run: python3 scripts/build_static_pages.py

      - name: Build hub pages SEO
        run: python3 scripts/build_hub_pages.py

      - name: Validate catalog and generated pages
        run: python3 scripts/validate_catalog.py

      - name: Smoke test - verify sitemap is valid XML
        run: python3 -c "import xml.etree.ElementTree as ET; ET.parse('sitemap.xml'); print('sitemap.xml OK')"

      - name: Smoke test - verify game pages exist
        run: |
          COUNT=$(find games/ -name '*.html' | wc -l)
          echo "Generated game pages: $COUNT"
          if [ "$COUNT" -lt 50 ]; then
            echo "::error::Suspiciously low game page count: $COUNT"
            exit 1
          fi

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/games.js games sitemap*.xml data/catalog.games.v1.json data/catalog.public.v1.json index.html assets/i18n.js
          if git diff --staged --quiet; then
            echo "Nessuna modifica da committare."
          else
            git commit -m "🤖 Auto-update database giochi"
            git pull --rebase -X ours origin main
            git push
          fi
