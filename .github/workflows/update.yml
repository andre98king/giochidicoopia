name: Update Games Database

on:
  schedule:
    - cron: '0 6 * * *'   # Ogni giorno alle 6:00 UTC
  workflow_dispatch:        # Avvio manuale dalla pagina Actions di GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Necessario per fare push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run update script
        run: python3 scripts/auto_update.py
        env:
          ITCH_IO_KEY: ${{ secrets.ITCH_IO_KEY }}
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}

      # 🔒 AUTO CURATION & QUALITY GATE — filtra giochi a bassa qualità PRIMA del deploy
      - name: 🔒 Auto Curation & Quality Gate
        run: |
          python3 << 'PYTHON_SCRIPT'
          import sys, json, shutil
          from pathlib import Path
          from datetime import datetime

          sys.path.insert(0, '.')
          from scripts.catalog_data import load_games
          from scripts.quality_gate import run_curation_gate

          # Leggi da games.js (fonte primaria con 574 giochi)
          catalog = load_games()
          valid, hidden, stats = run_curation_gate(catalog, strict=False, apply=False)

          Path('reports').mkdir(parents=True, exist_ok=True)
          report_file = f"reports/curation_gate_{datetime.utcnow().strftime('%Y%m%d_%H%M')}.json"
          with open(report_file, 'w', encoding='utf-8') as f:
              json.dump({'timestamp': datetime.utcnow().isoformat(), 'stats': stats, 'hidden_games': hidden}, f, indent=2, ensure_ascii=False)

          if stats.get('critical_fails', 0) > 0:
              print(f"🚫 CI BLOCKED: {stats['critical_fails']} critical fails. See {report_file}")
              sys.exit(1)

          # Salva catalogo filtrato per il builder
          catalog_path = Path('data/catalog.public.v1.json')
          if catalog_path.exists():
              shutil.copy2(catalog_path, catalog_path.with_suffix('.json.bak'))
          
          # Scrivi solo i giochi validi nel file che il builder userà
          catalog_path.parent.mkdir(parents=True, exist_ok=True)
          output_data = {
              "schemaVersion": 1,
              "generatedAt": datetime.utcnow().isoformat() + "Z",
              "games": valid
          }
          with open(catalog_path, 'w', encoding='utf-8') as f:
              json.dump(output_data, f, indent=2, ensure_ascii=False)
          
          print(f"✅ Catalogo filtrato: {stats['valid']} validi, {stats['hidden']} nascosti, {stats['critical_fails']} bloccati")
          PYTHON_SCRIPT

      - name: Fetch affiliate prices (IG + GameBillet)
        continue-on-error: true
        run: python3 scripts/fetch_affiliate_prices.py

      - name: Fetch Gameseal + Kinguin prices (CJ API)
        continue-on-error: true
        run: python3 scripts/fetch_gameseal_prices.py
        env:
          CJ_API_TOKEN: ${{ secrets.CJ_API_TOKEN }}

      - name: Fetch GAMIVO prices (CJ API)
        continue-on-error: true
        run: python3 scripts/fetch_gamivo_prices.py
        env:
          CJ_API_TOKEN: ${{ secrets.CJ_API_TOKEN }}

      - name: Fetch K4G prices
        continue-on-error: true
        run: python3 scripts/fetch_k4g_prices.py

      - name: Fetch GMG prices (Impact.com)
        continue-on-error: true
        run: python3 scripts/fetch_gmg_prices.py

      - name: Build static game pages
        run: python3 scripts/build_static_pages.py

      - name: Build hub pages SEO
        run: python3 scripts/build_hub_pages.py

      - name: Validate catalog and generated pages
        run: python3 scripts/validate_catalog.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/games.js games sitemap*.xml data/catalog.games.v1.json data/catalog.public.v1.json index.html assets/i18n.js
          if git diff --staged --quiet; then
            echo "Nessuna modifica da committare."
          else
            git commit -m "🤖 Auto-update database giochi"
            git pull --rebase -X ours origin main
            git push
          fi
