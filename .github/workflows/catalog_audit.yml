name: Catalog Quality Audit

on:
  schedule:
    - cron: '0 3 * * 0'   # Ogni domenica alle 3:00 UTC (prima del daily update)
  workflow_dispatch:        # Avvio manuale dalla pagina Actions di GitHub

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run catalog quality audit (fast mode, auto-remove false co-op)
        run: python3 scripts/catalog_audit.py --fast --apply
        env:
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}

      - name: Rebuild static pages (if games were removed)
        run: python3 scripts/build_static_pages.py

      - name: Validate catalog after audit
        run: python3 scripts/validate_catalog.py

      - name: Commit audit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/games.js games/ public/ sitemap*.xml \
                  data/audit_rejected.json data/audit_needs_review.json \
                  data/catalog.games.v1.json data/catalog.public.v1.json
          if git diff --staged --quiet; then
            echo "Nessuna modifica — catalogo già pulito."
          else
            git commit -m "🛡️ Auto-audit: removed false co-op entries"
            git pull --rebase -X ours origin main
            git push
          fi
