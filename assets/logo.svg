<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6aff"/>
      <stop offset="100%" stop-color="#ff5c8a"/>
    </linearGradient>
    <linearGradient id="pad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e8e4ff" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Gamepad body -->
  <g transform="translate(256,240)">
    <!-- Main body -->
    <path d="M-130,-40 C-130,-75 -105,-95 -70,-95 L70,-95 C105,-95 130,-75 130,-40 L130,10 C130,35 145,75 155,95 C165,115 155,135 130,135 C105,135 90,115 75,80 L60,45 L-60,45 L-75,80 C-90,115 -105,135 -130,135 C-155,135 -165,115 -155,95 C-145,75 -130,35 -130,10 Z"
          fill="url(#pad)" opacity="0.95"/>
    <!-- D-pad vertical -->
    <rect x="-80" y="-55" width="22" height="58" rx="4" fill="url(#bg)" opacity="0.8"/>
    <!-- D-pad horizontal -->
    <rect x="-98" y="-37" width="58" height="22" rx="4" fill="url(#bg)" opacity="0.8"/>
    <!-- Buttons -->
    <circle cx="60" cy="-45" r="12" fill="#ff5c8a" opacity="0.85"/>
    <circle cx="85" cy="-26" r="12" fill="#7c6aff" opacity="0.85"/>
    <circle cx="60" cy="-7" r="12" fill="#9b8aff" opacity="0.7"/>
    <circle cx="35" cy="-26" r="12" fill="#ff8fab" opacity="0.7"/>
    <!-- Analog sticks -->
    <circle cx="-50" cy="10" r="16" fill="none" stroke="url(#bg)" stroke-width="3" opacity="0.5"/>
    <circle cx="30" cy="10" r="16" fill="none" stroke="url(#bg)" stroke-width="3" opacity="0.5"/>
  </g>
  <!-- Text -->
  <text x="256" y="390" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="52" fill="#fff" letter-spacing="2">COOPHUBS</text>
</svg>
