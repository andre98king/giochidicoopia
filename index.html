<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Co-op Games Hub — I Migliori Giochi Cooperativi per PC</title>
  <meta name="description" content="Scopri oltre 500 giochi cooperativi per PC: horror, action, puzzle, survival e molto altro. Filtri per categoria, recensioni Steam e ruota random per scegliere il prossimo gioco co-op.">
  <meta name="keywords" content="giochi co-op, giochi cooperativi PC, co-op games, multiplayer, split screen, giochi coppia">
  <meta name="author" content="Co-op Games Hub">
  <meta name="theme-color" content="#7c6aff">
  <meta name="color-scheme" content="dark">

  <!--
    SITE_URL: https://coophubs.net
    Quando passi a dominio custom, cerca e sostituisci questo URL in:
      - index.html (canonical, og:url, og:image, structured data)
      - sitemap.xml (<loc>)
      - robots.txt (Sitemap:)
  -->

  <!-- Canonical + hreflang -->
  <link rel="canonical" href="https://coophubs.net/">
  <link rel="alternate" hreflang="it" href="https://coophubs.net/">
  <link rel="alternate" hreflang="en" href="https://coophubs.net/">
  <link rel="alternate" hreflang="x-default" href="https://coophubs.net/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Co-op Games Hub — I Migliori Giochi Cooperativi per PC">
  <meta property="og:description" content="Scopri oltre 500 giochi cooperativi per PC, categorizzati e recensiti. Trova il tuo prossimo gioco co-op!">
  <meta property="og:image" content="https://coophubs.net/assets/og-image.jpg">
  <meta property="og:url" content="https://coophubs.net/">
  <meta property="og:locale" content="it_IT">
  <meta property="og:locale:alternate" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Co-op Games Hub">
  <meta name="twitter:description" content="Oltre 500 giochi cooperativi per PC, categorizzati e recensiti.">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json?v=20260314-cachefix1">

  <!-- Fonts (non-blocking) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">

  <!-- CSS -->
  <link rel="stylesheet" href="assets/style.css?v=20260314-cachefix1">

  <!-- Structured Data -->
  <script id="pageJsonLd" type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Co-op Games Hub",
    "url": "https://coophubs.net/",
    "description": "Catalogo dei migliori giochi cooperativi per PC",
    "inLanguage": ["it", "en"],
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://coophubs.net/?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>
</head>
<body data-page="home">
  <!-- Animated background particles -->
  <canvas id="bgCanvas" class="bg-canvas" aria-hidden="true"></canvas>

  <!-- Skip to main content (accessibility) -->
  <a href="#gamesGrid" class="skip-link" data-i18n="skip_to_content">Vai al contenuto principale</a>

  <!-- HERO -->
  <header class="hero">
    <h1>Co-op Games Hub</h1>
    <p id="heroSub">Tutti i migliori giochi cooperativi per PC, categorizzati e commentati</p>
    <div class="hero-stats">
      <div class="stat">
        <span class="stat-number" id="totalGames">0</span>
        <span class="stat-label">Giochi</span>
      </div>
      <div class="stat">
        <span class="stat-number" id="playedGames">0</span>
        <span class="stat-label">Giocati da me</span>
      </div>
      <div class="stat">
        <span class="stat-number" id="totalCats">0</span>
        <span class="stat-label">Categorie</span>
      </div>
    </div>
  </header>

  <!-- TOOLBAR -->
  <nav class="toolbar" role="navigation" aria-label="Filtri e ricerca" data-i18n-aria-label="toolbar_aria">
    <div class="toolbar-inner">
      <!-- Ricerca -->
      <div class="search-box" role="search">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Cerca un gioco..." aria-label="Cerca un gioco" data-i18n-placeholder="search_placeholder" data-i18n-aria-label="search_aria">
        <button class="search-clear" id="searchClear" style="display:none" aria-label="Cancella ricerca" data-i18n-aria-label="clear_search_aria">✕</button>
      </div>

      <!-- Filtri categorie -->
      <div class="filters" id="filterContainer" role="group" aria-label="Filtri per categoria" data-i18n-aria-label="filters_category_aria"></div>

      <!-- Filtri modalità co-op -->
      <div class="filters filters-mode" id="modeFilterContainer" role="group" aria-label="Filtri per modalità" data-i18n-aria-label="filters_mode_aria"></div>

      <!-- Ordinamento -->
      <select class="sort-select" id="sortSelect" aria-label="Ordina giochi" data-i18n-aria-label="sort_aria">
        <option value="default">📋 Default</option>
        <option value="rating">⭐ Meglio recensiti</option>
        <option value="trending">🔥 Più giocati ora</option>
        <option value="az">🔤 A → Z</option>
      </select>

      <!-- Ruota random -->
      <button class="btn-wheel" id="wheelBtn" aria-label="Gioco random" data-i18n-aria-label="btn_wheel_aria">🎡 Gioco Random</button>
      <!-- Lingua -->
      <button class="btn-lang" id="langBtn" onclick="setLang(currentLang === 'it' ? 'en' : 'it')" aria-label="Cambia lingua" data-i18n-aria-label="btn_lang_aria">🇬🇧 EN</button>
      <!-- Admin -->
      <button class="btn-admin" id="adminBtn" aria-label="Modalità admin" data-i18n-aria-label="btn_admin_aria">🔒 Admin</button>
    </div>
  </nav>

  <!-- FREE GAMES -->
  <section id="freeGamesSection" class="free-games-section" hidden aria-label="Offerte gratuite attive" data-i18n-aria-label="free_section_aria"></section>

  <!-- FEATURED INDIE OF THE WEEK -->
  <section id="featuredSection" aria-label="Gioco indie della settimana" data-i18n-aria-label="featured_section_aria"></section>

  <!-- MAIN -->
  <main class="main" id="mainContent">
    <div class="results-info" id="resultsInfo" aria-live="polite"></div>
    <div class="games-grid" id="gamesGrid" role="list"></div>
  </main>

  <!-- MODAL DETTAGLIO GIOCO -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-label="Dettaglio gioco" data-i18n-aria-label="modal_game_aria">
    <div class="modal" id="modalContent"></div>
  </div>

  <!-- MODAL ADMIN EDIT -->
  <div class="modal-overlay" id="adminOverlay" role="dialog" aria-modal="true" aria-label="Modifica gioco" data-i18n-aria-label="modal_edit_aria">
    <div class="modal" style="max-width:480px">
      <div class="modal-body">
        <div class="modal-header">
          <div class="modal-title" id="adminGameTitle"></div>
          <button class="modal-close" onclick="closeAdminModal()" aria-label="Chiudi" data-i18n-aria-label="btn_close_aria">✕</button>
        </div>
        <input type="hidden" id="adminGameId">
        <div>
          <div class="modal-section-title" id="adminPlayedTitle">✓ Hai giocato questo gioco?</div>
          <label class="admin-toggle">
            <input type="checkbox" id="adminPlayedInput">
            <span class="admin-toggle-label" id="adminPlayedLabel">Segna come giocato</span>
          </label>
        </div>
        <div>
          <div class="modal-section-title" id="adminNoteTitle">📝 La tua nota personale</div>
          <textarea id="adminNoteInput" class="admin-textarea"
            placeholder="Scrivi la tua esperienza personale con questo gioco..." maxlength="1000"></textarea>
        </div>
        <div class="modal-actions">
          <button class="btn-primary" id="adminSaveBtn" onclick="saveAdminEdit()">💾 Salva</button>
          <button class="btn-details" id="adminCancelBtn" onclick="closeAdminModal()" style="padding:10px 20px">Annulla</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL RUOTA -->
  <div class="modal-overlay" id="wheelOverlay" role="dialog" aria-modal="true" aria-label="Ruota gioco random" data-i18n-aria-label="modal_random_aria">
    <div class="modal wheel-modal">
      <div class="modal-body">
        <div class="modal-header" style="justify-content:center; position:relative">
          <div class="modal-title" id="wheelTitle">🎡 Ruota Gioco Random</div>
          <button class="modal-close" onclick="closeWheelModal()" style="position:absolute;right:0;top:0" aria-label="Chiudi" data-i18n-aria-label="btn_close_aria">✕</button>
        </div>

        <div class="wheel-wrapper">
          <canvas id="wheelCanvas" width="320" height="320" aria-label="Ruota della fortuna" data-i18n-aria-label="wheel_canvas_aria"></canvas>
          <div class="wheel-pointer" aria-hidden="true"></div>
        </div>

        <button class="btn-spin" id="spinBtn" onclick="spinWheel()">🎰 Gira la Ruota!</button>

        <div class="wheel-result" id="wheelResult" aria-live="assertive">
          <div class="wheel-result-title" id="wheelResultTitle"></div>
          <div class="wheel-result-sub" id="wheelResultSub"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scroll to top -->
  <button class="scroll-top" id="scrollTopBtn" aria-label="Torna su" data-i18n-aria-label="scroll_top_aria">
    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 15l7-7 7 7"/>
    </svg>
  </button>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">Co-op Games Hub</div>
      <div class="footer-sub" id="footerSub" data-i18n="footer_sub"></div>
      <div class="footer-links">
        <a href="about.html" id="footerAbout" data-i18n="footer_about"></a>
        <a href="contact.html" id="footerContact" data-i18n="footer_contact"></a>
        <a href="free.html" id="footerFree" data-i18n="footer_free"></a>
        <a href="privacy.html" id="footerPrivacy" data-i18n="footer_privacy"></a>
      </div>
      <div class="footer-divider"></div>
      <div class="footer-copy" data-i18n="footer_copy"></div>
    </div>
  </footer>

  <script>
    window.freeGamesReady = new Promise((resolve) => {
      const script = document.createElement('script');
      const cacheBucket = Math.floor(Date.now() / 300000);
      let settled = false;
      const finish = () => {
        if (settled) return;
        settled = true;
        clearTimeout(timeoutId);
        resolve();
      };
      const timeoutId = window.setTimeout(finish, 4000);
      script.src = `assets/free_games.js?v=${cacheBucket}`;
      script.onload = () => {
        finish();
        window.dispatchEvent(new Event('freegamesloaded'));
      };
      script.onerror = finish;
      document.head.appendChild(script);
    });
  </script>
  <script src="assets/i18n.js?v=20260314-cachefix1" defer></script>
  <script src="assets/app.js?v=20260314-cachefix1" defer></script>
  <script src="assets/particles.js?v=20260314-cachefix1" defer></script>
</body>
</html>
